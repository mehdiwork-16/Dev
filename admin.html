<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>DevelopMe — Admin</title>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:wght@700&family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap" rel="stylesheet"/>
<link rel="stylesheet" href="css/style.css"/>
<style>
/* ── LOGIN SCREEN ─────────────────────────────────────────────────── */
#login-screen {
  display: flex; align-items: center; justify-content: center;
  min-height: 100vh; padding: 1.5rem;
  background: linear-gradient(145deg, #FAFBFF 0%, #EDEDFF 50%, #E5F4FF 100%);
}
.login-box {
  background: #fff; border: 1.5px solid var(--border);
  border-radius: 20px; padding: 2.5rem;
  width: 100%; max-width: 380px;
  box-shadow: var(--sh2);
}
.login-logo { font-family: 'Fraunces', serif; font-size: 1.5rem; font-weight: 700; color: var(--ink); margin-bottom: 0.3rem; }
.login-logo em { color: var(--accent); font-style: normal; }
.login-sub { font-size: 0.9rem; color: var(--muted); font-weight: 500; margin-bottom: 2rem; }
.login-label { font-size: 0.73rem; font-weight: 600; color: var(--ink2); display: block; margin-bottom: 0.35rem; }
.login-input {
  width: 100%; background: var(--bg);
  border: 1.5px solid var(--border); border-radius: 10px;
  padding: 0.75rem 1rem;
  font-family: 'Plus Jakarta Sans', sans-serif; font-size: 0.9rem; color: var(--ink);
  outline: none; transition: border-color 0.2s;
}
.login-input:focus { border-color: var(--accent); box-shadow: 0 0 0 3px rgba(67,56,202,0.1); }
.login-btn {
  width: 100%; margin-top: 1.2rem; padding: 0.82rem;
  background: var(--accent); color: #fff; border: none;
  border-radius: 10px; font-family: 'Plus Jakarta Sans', sans-serif;
  font-size: 0.92rem; font-weight: 600; cursor: pointer; transition: all 0.2s;
}
.login-btn:hover { background: var(--accent-hover); transform: translateY(-1px); }
.login-err {
  display: none; margin-top: 0.8rem;
  padding: 0.6rem 0.9rem;
  background: rgba(239,68,68,0.08); color: var(--danger);
  border-radius: 9px; font-size: 0.82rem; font-weight: 600;
  border: 1px solid rgba(239,68,68,0.2);
}
</style>
</head>
<body>

<!-- ── LOGIN ─────────────────────────────────────────────────────────────── -->
<div id="login-screen">
  <div class="login-box">
    <div class="login-logo">Develop<em>Me</em></div>
    <p class="login-sub">Dashboard Admin — Supabase</p>
    <label class="login-label" for="email">Email</label>
    <input class="login-input" type="email" id="email"
           placeholder="votre@email.com" style="margin-bottom:0.9rem"
           onkeydown="if(event.key==='Enter')login()"/>
    <label class="login-label" for="pwd">Mot de passe</label>
    <input class="login-input" type="password" id="pwd"
           placeholder="••••••••••"
           onkeydown="if(event.key==='Enter')login()"/>
    <button class="login-btn" id="login-btn" onclick="login()">Accéder au dashboard →</button>
    <div class="login-err" id="login-err">Email ou mot de passe incorrect.</div>
  </div>
</div>

<!-- ── APP (masqué jusqu'au login) ───────────────────────────────────────── -->
<div id="app" style="display:none">

  <div class="topbar">
    <div class="topbar-logo">Develop<em>Me</em> <span>Admin</span></div>
    <div class="topbar-right">
      <span class="topbar-date" id="topbar-date"></span>
      <button class="btn-logout" onclick="logout()">Déconnexion</button>
    </div>
  </div>

  <div class="main">

    <!-- KPIs -->
    <div class="kpi-row">
      <div class="kpi kpi-total">
        <div class="kpi-label">Total leads</div>
        <div class="kpi-value" id="kpi-total">—</div>
        <div class="kpi-sub">Depuis le lancement</div>
      </div>
      <div class="kpi kpi-today">
        <div class="kpi-label">Aujourd'hui</div>
        <div class="kpi-value" id="kpi-today">—</div>
        <div class="kpi-sub">Nouveaux messages</div>
      </div>
      <div class="kpi kpi-last">
        <div class="kpi-label">Dernier message</div>
        <div class="kpi-value sm" id="kpi-last-name">—</div>
        <div class="kpi-sub" id="kpi-last-time"></div>
      </div>
    </div>

    <!-- Table -->
    <div class="table-card">
      <div class="table-head">
        <h3>Messages reçus <span class="badge-count" id="badge-count">0</span></h3>
        <button class="btn-refresh" onclick="loadData()">↻ Actualiser</button>
      </div>

      <div id="table-body">
        <div class="table-state">
          <div class="spinner"></div>
          <p>Chargement…</p>
        </div>
      </div>

      <div class="pagination" id="pagination" style="display:none">
        <button class="pg-btn" id="pg-prev" onclick="changePage(-1)">← Préc.</button>
        <span id="pg-info"></span>
        <button class="pg-btn" id="pg-next" onclick="changePage(1)">Suiv. →</button>
      </div>
    </div>

  </div>
</div>

<!-- ── SCRIPTS ────────────────────────────────────────────────────────────── -->
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="js/admin.js"></script>
<script>
async function login() {
  const email = document.getElementById('email').value.trim();
  const pwd   = document.getElementById('pwd').value.trim();
  const err   = document.getElementById('login-err');
  const btn   = document.getElementById('login-btn');

  if (!email || !pwd) { err.style.display = 'block'; return; }

  btn.textContent = 'Connexion…';
  btn.disabled    = true;

  const { error } = await sb.auth.signInWithPassword({ email, password: pwd });

  if (error) {
    err.style.display   = 'block';
    btn.textContent     = 'Accéder au dashboard →';
    btn.disabled        = false;
    return;
  }

  err.style.display = 'none';
  document.getElementById('login-screen').style.display = 'none';
  document.getElementById('app').style.display          = 'block';
  document.getElementById('topbar-date').textContent    =
    new Date().toLocaleDateString('fr-DZ', {
      weekday: 'long', day: 'numeric', month: 'long', year: 'numeric'
    });
  loadData();
}

async function logout() {
  await sb.auth.signOut();
  document.getElementById('app').style.display          = 'none';
  document.getElementById('login-screen').style.display = 'flex';
  document.getElementById('pwd').value   = '';
  document.getElementById('email').value = '';
}
</script>

</body>
</html>
