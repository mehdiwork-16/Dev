<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>DevelopMe — Admin</title>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:wght@700&family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap" rel="stylesheet"/>
<style>
:root{
  --accent:#4338CA;--accent-hover:#3730A3;--accent-soft:rgba(67,56,202,0.08);
  --ink:#0D0F1C;--ink2:#374151;--muted:#6B7280;
  --surface:#FFFFFF;--bg:#FAFBFF;--border:#E5E7F0;
  --success:#10B981;--warning:#F59E0B;--danger:#EF4444;
  --sh:0 2px 12px rgba(67,56,202,0.07);--sh2:0 8px 32px rgba(67,56,202,0.13);
  --r:12px;
}
*{margin:0;padding:0;box-sizing:border-box;}
body{font-family:'Plus Jakarta Sans',sans-serif;background:var(--bg);color:var(--ink);min-height:100vh;}

/* LOGIN */
#login-screen{display:flex;align-items:center;justify-content:center;min-height:100vh;padding:1.5rem;}
.login-box{background:var(--surface);border:1.5px solid var(--border);border-radius:20px;padding:2.5rem;width:100%;max-width:380px;box-shadow:var(--sh2);}
.login-logo{font-family:'Fraunces',serif;font-size:1.5rem;font-weight:700;color:var(--ink);margin-bottom:0.3rem;}
.login-logo em{color:var(--accent);font-style:normal;}
.login-box h2{font-size:1rem;color:var(--muted);font-weight:500;margin-bottom:2rem;}
.login-box label{font-size:0.73rem;font-weight:600;color:var(--ink2);display:block;margin-bottom:0.35rem;}
.login-box input{width:100%;background:var(--bg);border:1.5px solid var(--border);border-radius:10px;padding:0.75rem 1rem;font-family:'Plus Jakarta Sans',sans-serif;font-size:0.9rem;color:var(--ink);outline:none;transition:border-color 0.2s;}
.login-box input:focus{border-color:var(--accent);box-shadow:0 0 0 3px rgba(67,56,202,0.1);}
.login-btn{width:100%;margin-top:1.2rem;padding:0.82rem;background:var(--accent);color:#fff;border:none;border-radius:10px;font-family:'Plus Jakarta Sans',sans-serif;font-size:0.92rem;font-weight:600;cursor:pointer;transition:all 0.2s;}
.login-btn:hover{background:var(--accent-hover);transform:translateY(-1px);}
#login-err{display:none;margin-top:0.8rem;padding:0.6rem 0.9rem;background:rgba(239,68,68,0.08);color:var(--danger);border-radius:9px;font-size:0.82rem;font-weight:600;border:1px solid rgba(239,68,68,0.2);}

/* APP */
#app{display:none;}
.topbar{background:var(--surface);border-bottom:1px solid var(--border);padding:0 2rem;height:60px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:100;box-shadow:var(--sh);}
.topbar-logo{font-family:'Fraunces',serif;font-size:1.2rem;font-weight:700;color:var(--ink);}
.topbar-logo em{color:var(--accent);font-style:normal;}
.topbar-logo span{font-family:'Plus Jakarta Sans',sans-serif;font-size:0.72rem;font-weight:600;color:var(--muted);background:var(--accent-soft);padding:0.18rem 0.55rem;border-radius:100px;margin-left:0.5rem;}
.topbar-right{display:flex;align-items:center;gap:1rem;}
.topbar-right button{background:transparent;border:1.5px solid var(--border);border-radius:9px;padding:0.38rem 0.9rem;font-family:'Plus Jakarta Sans',sans-serif;font-size:0.78rem;font-weight:600;color:var(--muted);cursor:pointer;transition:all 0.2s;}
.topbar-right button:hover{border-color:var(--danger);color:var(--danger);}

.main{padding:2rem;}

/* KPI CARDS */
.kpi-row{display:grid;grid-template-columns:repeat(3,1fr);gap:1.2rem;margin-bottom:2rem;}
.kpi{background:var(--surface);border:1.5px solid var(--border);border-radius:var(--r);padding:1.4rem 1.6rem;position:relative;overflow:hidden;transition:box-shadow 0.2s;}
.kpi:hover{box-shadow:var(--sh2);}
.kpi::before{content:'';position:absolute;top:0;left:0;right:0;height:3px;}
.kpi-total::before{background:linear-gradient(90deg,var(--accent),#818CF8);}
.kpi-today::before{background:linear-gradient(90deg,var(--success),#34D399);}
.kpi-last::before{background:linear-gradient(90deg,var(--warning),#FCD34D);}
.kpi-label{font-size:0.7rem;font-weight:700;letter-spacing:1.5px;text-transform:uppercase;color:var(--muted);margin-bottom:0.8rem;}
.kpi-value{font-family:'Fraunces',serif;font-size:2.4rem;font-weight:700;color:var(--ink);line-height:1;}
.kpi-sub{font-size:0.78rem;color:var(--muted);margin-top:0.4rem;}

/* TABLE */
.table-card{background:var(--surface);border:1.5px solid var(--border);border-radius:var(--r);overflow:hidden;box-shadow:var(--sh);}
.table-head{display:flex;align-items:center;justify-content:space-between;padding:1.2rem 1.5rem;border-bottom:1px solid var(--border);}
.table-head h3{font-family:'Fraunces',serif;font-size:1.1rem;font-weight:700;color:var(--ink);}
.table-head-right{display:flex;align-items:center;gap:0.8rem;}
#refresh-btn{display:flex;align-items:center;gap:0.4rem;background:var(--accent-soft);color:var(--accent);border:1px solid rgba(67,56,202,0.15);border-radius:9px;padding:0.4rem 0.9rem;font-family:'Plus Jakarta Sans',sans-serif;font-size:0.78rem;font-weight:600;cursor:pointer;transition:all 0.2s;}
#refresh-btn:hover{background:var(--accent);color:#fff;}
.badge-count{background:var(--accent);color:#fff;font-size:0.65rem;font-weight:700;padding:0.2rem 0.55rem;border-radius:100px;}

table{width:100%;border-collapse:collapse;}
thead tr{background:var(--bg);}
th{font-size:0.68rem;font-weight:700;letter-spacing:0.8px;text-transform:uppercase;color:var(--muted);padding:0.75rem 1.2rem;text-align:left;border-bottom:1px solid var(--border);}
td{padding:1rem 1.2rem;font-size:0.84rem;color:var(--ink2);border-bottom:1px solid var(--border);vertical-align:top;}
tr:last-child td{border-bottom:none;}
tbody tr{transition:background 0.15s;}
tbody tr:hover{background:#FAFBFF;}
.td-name{font-weight:600;color:var(--ink);}
.td-email{color:var(--muted);font-size:0.79rem;}
.td-msg{max-width:300px;color:var(--muted);font-size:0.81rem;overflow:hidden;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;}
.td-service{display:inline-block;background:var(--accent-soft);color:var(--accent);padding:0.18rem 0.55rem;border-radius:100px;font-size:0.7rem;font-weight:600;border:1px solid rgba(67,56,202,0.15);white-space:nowrap;}
.td-date{color:var(--muted);font-size:0.78rem;white-space:nowrap;}

/* EMPTY / LOADING */
.table-state{text-align:center;padding:3.5rem 1rem;color:var(--muted);}
.table-state .icon{font-size:2.5rem;margin-bottom:0.8rem;}
.table-state p{font-size:0.88rem;}
.spinner{display:inline-block;width:28px;height:28px;border:3px solid var(--border);border-top-color:var(--accent);border-radius:50%;animation:spin 0.7s linear infinite;margin-bottom:0.8rem;}
@keyframes spin{to{transform:rotate(360deg);}}

/* PAGINATION */
.pagination{display:flex;align-items:center;justify-content:center;gap:0.5rem;padding:1.2rem;}
.pg-btn{background:var(--surface);border:1.5px solid var(--border);border-radius:8px;padding:0.38rem 0.85rem;font-family:'Plus Jakarta Sans',sans-serif;font-size:0.8rem;font-weight:600;color:var(--muted);cursor:pointer;transition:all 0.2s;}
.pg-btn:hover:not(:disabled){border-color:var(--accent);color:var(--accent);}
.pg-btn:disabled{opacity:0.4;cursor:not-allowed;}
.pg-btn.active{background:var(--accent);color:#fff;border-color:var(--accent);}
#pg-info{font-size:0.78rem;color:var(--muted);padding:0 0.5rem;}

@media(max-width:768px){
  .kpi-row{grid-template-columns:1fr;}
  .main{padding:1rem;}
  th:nth-child(4),td:nth-child(4){display:none;}
}
</style>
</head>
<body>

<!-- LOGIN -->
<div id="login-screen">
  <div class="login-box">
    <div class="login-logo">Develop<em>Me</em></div>
    <h2>Dashboard Admin</h2>
    <label for="pwd">Mot de passe</label>
    <input type="password" id="pwd" placeholder="••••••••••" onkeydown="if(event.key==='Enter')login()"/>
    <button class="login-btn" onclick="login()">Accéder au dashboard →</button>
    <div id="login-err">Mot de passe incorrect.</div>
  </div>
</div>

<!-- APP -->
<div id="app">
  <div class="topbar">
    <div class="topbar-logo">Develop<em>Me</em> <span>Admin</span></div>
    <div class="topbar-right">
      <span id="topbar-date" style="font-size:0.78rem;color:var(--muted)"></span>
      <button onclick="logout()">Déconnexion</button>
    </div>
  </div>

  <div class="main">
    <!-- KPIs -->
    <div class="kpi-row">
      <div class="kpi kpi-total">
        <div class="kpi-label">Total leads</div>
        <div class="kpi-value" id="kpi-total">—</div>
        <div class="kpi-sub">Depuis le lancement</div>
      </div>
      <div class="kpi kpi-today">
        <div class="kpi-label">Aujourd'hui</div>
        <div class="kpi-value" id="kpi-today">—</div>
        <div class="kpi-sub">Nouveaux messages</div>
      </div>
      <div class="kpi kpi-last">
        <div class="kpi-label">Dernier message</div>
        <div class="kpi-value" id="kpi-last-name" style="font-size:1.3rem;margin-top:0.3rem">—</div>
        <div class="kpi-sub" id="kpi-last-time"></div>
      </div>
    </div>

    <!-- TABLE -->
    <div class="table-card">
      <div class="table-head">
        <h3>Messages reçus <span class="badge-count" id="badge-count">0</span></h3>
        <div class="table-head-right">
          <button id="refresh-btn" onclick="loadData()">↻ Actualiser</button>
        </div>
      </div>

      <div id="table-body">
        <div class="table-state">
          <div class="spinner"></div>
          <p>Chargement…</p>
        </div>
      </div>

      <div class="pagination" id="pagination" style="display:none">
        <button class="pg-btn" id="pg-prev" onclick="changePage(-1)">← Préc.</button>
        <span id="pg-info"></span>
        <button class="pg-btn" id="pg-next" onclick="changePage(1)">Suiv. →</button>
      </div>
    </div>
  </div>
</div>

<script>
const API        = 'http://localhost:3000';
let   sessionPass = '';
let   currentPage = 1;
let   totalPages  = 1;

// ── AUTH ──────────────────────────────────────────────────────────────────
function login(){
  const pwd = document.getElementById('pwd').value.trim();
  if(!pwd) return;
  sessionPass = pwd;
  document.getElementById('login-err').style.display = 'none';
  loadData();
}

function logout(){
  sessionPass = '';
  currentPage = 1;
  document.getElementById('app').style.display   = 'none';
  document.getElementById('login-screen').style.display = 'flex';
  document.getElementById('pwd').value = '';
}

// ── DATA ──────────────────────────────────────────────────────────────────
async function loadData(){
  setTableLoading();
  try {
    const res  = await fetch(`${API}/contacts?pass=${encodeURIComponent(sessionPass)}&page=${currentPage}`);
    if(res.status === 401){
      document.getElementById('login-err').style.display = 'block';
      return;
    }
    const data = await res.json();

    // Show app
    document.getElementById('login-screen').style.display = 'none';
    document.getElementById('app').style.display          = 'block';
    document.getElementById('topbar-date').textContent    = new Date().toLocaleDateString('fr-DZ',{weekday:'long',day:'numeric',month:'long',year:'numeric'});

    // KPIs
    document.getElementById('kpi-total').textContent     = data.total;
    document.getElementById('kpi-today').textContent     = data.today;
    document.getElementById('badge-count').textContent   = data.total;
    if(data.last){
      document.getElementById('kpi-last-name').textContent = data.last.name;
      document.getElementById('kpi-last-time').textContent = formatDate(data.last.created_at);
    }

    // Pagination
    totalPages  = data.pages || 1;
    currentPage = data.page  || 1;
    renderPagination();

    // Table
    renderTable(data.contacts);

  } catch(err){
    setTableError('Impossible de contacter le serveur. Vérifiez que le backend tourne sur le port 3000.');
  }
}

function changePage(dir){
  const next = currentPage + dir;
  if(next < 1 || next > totalPages) return;
  currentPage = next;
  loadData();
}

// ── RENDER ────────────────────────────────────────────────────────────────
function renderTable(rows){
  if(!rows.length){
    document.getElementById('table-body').innerHTML = `
      <div class="table-state">
        <div class="icon">📭</div>
        <p>Aucun message reçu pour le moment.</p>
      </div>`;
    return;
  }

  const rowsHtml = rows.map(r => `
    <tr>
      <td><div class="td-name">${esc(r.name)}</div><div class="td-email">${esc(r.email)}</div>${r.phone?`<div class="td-email">${esc(r.phone)}</div>`:''}</td>
      <td>${r.service?`<span class="td-service">${esc(r.service)}</span>`:'<span style="color:var(--muted);font-size:0.78rem">—</span>'}</td>
      <td><div class="td-msg">${esc(r.message)}</div></td>
      <td class="td-date">${formatDate(r.created_at)}</td>
    </tr>
  `).join('');

  document.getElementById('table-body').innerHTML = `
    <table>
      <thead><tr>
        <th>Contact</th>
        <th>Service</th>
        <th>Message</th>
        <th>Date</th>
      </tr></thead>
      <tbody>${rowsHtml}</tbody>
    </table>`;
}

function renderPagination(){
  const pg = document.getElementById('pagination');
  if(totalPages <= 1){ pg.style.display='none'; return; }
  pg.style.display = 'flex';
  document.getElementById('pg-info').textContent  = `Page ${currentPage} / ${totalPages}`;
  document.getElementById('pg-prev').disabled     = currentPage <= 1;
  document.getElementById('pg-next').disabled     = currentPage >= totalPages;
}

function setTableLoading(){
  document.getElementById('table-body').innerHTML = `
    <div class="table-state"><div class="spinner"></div><p>Chargement…</p></div>`;
  document.getElementById('pagination').style.display = 'none';
}

function setTableError(msg){
  document.getElementById('table-body').innerHTML = `
    <div class="table-state"><div class="icon">⚠️</div><p>${msg}</p></div>`;
}

// ── UTILS ─────────────────────────────────────────────────────────────────
function esc(s){ const d=document.createElement('div');d.textContent=s||'';return d.innerHTML; }

function formatDate(ts){
  if(!ts) return '—';
  return new Date(ts).toLocaleDateString('fr-DZ',{day:'numeric',month:'short',year:'numeric',hour:'2-digit',minute:'2-digit'});
}
</script>
</body>
</html>
